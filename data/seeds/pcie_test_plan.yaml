- name: U.2 Backplane & Cable Signal Integrity
  subcategories:
  - name: U.2 Backplane & Cable Signal Integrity
    items:
    - id: U2SI-001
      title: Direct-attach (no cable) — Gen4 eye
      description: "Measure TX eye diagram at U.2 connector TP2 with direct-attach (device in test fixture). Verify Gen4 eye\
        \ mask."
      priority: P0
      tool: High-BW oscilloscope
      spec_ref: PCIe §4.2
    - id: U2SI-002
      title: Direct-attach — Gen5 eye
      description: Same as above at 32GT/s PAM4. Verify all 3 PAM4 eyes meet mask.
      priority: P0
      tool: High-BW oscilloscope (≥50GHz)
      spec_ref: PCIe §4.2
    - id: U2SI-003
      title: Through 0.5m SFF-8643 cable — Gen4
      description: Measure eye at far end of 0.5m cable. Verify link trains at Gen4 x4.
      priority: P0
      tool: Oscilloscope + cable
      spec_ref: SFF-8643
    - id: U2SI-004
      title: Through 0.5m cable — Gen5
      description: Same with Gen5. Higher loss at 32GT/s — may need retimer.
      priority: P0
      tool: Oscilloscope + cable
      spec_ref: SFF-8643
    - id: U2SI-005
      title: Through 1.0m cable — Gen4
      description: "Longer cable: verify Gen4 still trains, measure eye margin."
      priority: P1
      tool: Oscilloscope + cable
      spec_ref: SFF-8643
    - id: U2SI-006
      title: Through 1.0m cable — Gen5
      description: Likely marginal or fail at Gen5 without retimer. Document result.
      priority: P1
      tool: Oscilloscope + cable
      spec_ref: SFF-8643
    - id: U2SI-007
      title: Cable insertion loss measurement
      description: "VNA: measure S21 (insertion loss) of cable at 8/16/32 GHz."
      priority: P0
      tool: VNA
      spec_ref: —
    - id: U2SI-008
      title: Cable return loss measurement
      description: "VNA: measure S11 (return loss) at each connector end."
      priority: P1
      tool: VNA
      spec_ref: —
    - id: U2SI-009
      title: Cable crosstalk (NEXT/FEXT)
      description: "VNA: measure near-end and far-end crosstalk between adjacent lane pairs."
      priority: P1
      tool: VNA
      spec_ref: —
    - id: U2SI-010
      title: Through enterprise backplane — Gen4
      description: Install in enterprise JBOF backplane (e.g., 24-bay). Verify Gen4 x4 link. Measure lane margin.
      priority: P0
      tool: Backplane + LeCroy + margin
      spec_ref: —
    - id: U2SI-011
      title: Through enterprise backplane — Gen5
      description: Same with Gen5. Check if backplane SI supports 32GT/s.
      priority: P1
      tool: Backplane + LeCroy + margin
      spec_ref: —
    - id: U2SI-012
      title: Backplane + cable combined
      description: Cable from HBA to backplane + backplane trace to U.2 connector. Worst case channel.
      priority: P1
      tool: End-to-end measurement
      spec_ref: —
    - id: U2SI-013
      title: Retimer interaction (if applicable)
      description: If backplane has PCIe retimer, verify retimer + device EQ cooperation. Check added latency.
      priority: P1
      tool: LeCroy + latency measurement
      spec_ref: —
    - id: U2SI-014
      title: Lane margin through cable at 25/55/85°C
      description: Run lane margining through cable at 3 temperatures. Plot margin vs temperature.
      priority: P1
      tool: Thermal chamber + margin tool
      spec_ref: —
- name: Gen4↔Gen5 Backward Compatibility
  subcategories:
  - name: Gen4↔Gen5 Backward Compatibility
    items:
    - id: COMPAT-001
      title: Gen4 platform — full function
      description: Install in Gen4-only platform (e.g., AMD Ryzen 5000). Verify trains at Gen4 x4, full IO functional.
      priority: P0
      tool: Gen4 platform + Linux
      spec_ref: —
    - id: COMPAT-002
      title: Gen5 platform — Gen5 speed
      description: Install in Gen5 platform (e.g., Sapphire Rapids). Verify trains at Gen5 x4.
      priority: P0
      tool: Gen5 platform + Linux
      spec_ref: —
    - id: COMPAT-003
      title: Gen5 platform — forced Gen4
      description: In BIOS, limit slot to Gen4. Verify device trains at Gen4, not Gen5.
      priority: P0
      tool: BIOS + lspci
      spec_ref: —
    - id: COMPAT-004
      title: Gen5 platform — forced Gen3
      description: Limit to Gen3. Verify correct operation at 8GT/s.
      priority: P1
      tool: BIOS + lspci
      spec_ref: —
    - id: COMPAT-005
      title: Speed switch Gen4→Gen5 runtime
      description: From Gen4, issue directed speed change to Gen5 (setpci retrain). Verify success.
      priority: P1
      tool: Linux + LeCroy
      spec_ref: —
    - id: COMPAT-006
      title: Speed switch Gen5→Gen4 runtime
      description: From Gen5, downgrade to Gen4. Verify no data loss, IO continues.
      priority: P1
      tool: Linux + LeCroy
      spec_ref: —
    - id: COMPAT-007
      title: Performance ratio Gen4 vs Gen5
      description: "Run same fio workload at Gen4 and Gen5. Verify Gen5 is ~2x bandwidth of Gen4 (if device controller isn't\
        \ bottleneck)."
      priority: P0
      tool: fio + lspci
      spec_ref: —
    - id: COMPAT-008
      title: Gen5 fallback after EQ failure
      description: "If Gen5 EQ fails (e.g., bad channel), verify device cleanly falls back to Gen4 and remains functional."
      priority: P0
      tool: LeCroy (inject EQ failure)
      spec_ref: —
    - id: COMPAT-009
      title: Gen3 platform compatibility
      description: Old Gen3 platform (e.g., Intel Haswell). Verify device still works at Gen3 x4.
      priority: P1
      tool: Gen3 platform
      spec_ref: —
    - id: COMPAT-010
      title: Mixed-gen multi-drive
      description: "In same system: one drive at Gen4, another at Gen5 (different slots). Verify no interference."
      priority: P2
      tool: Multi-slot platform
      spec_ref: —
- name: SR-IOV (Single Root I/O Virtualization)
  subcategories:
  - name: SR-IOV (Single Root I/O Virtualization)
    items:
    - id: SRIOV-001
      title: SR-IOV capability presence
      description: Check if device exposes SR-IOV Extended Capability (Cap ID 0010h). Read TotalVFs, InitialVFs.
      priority: P1
      tool: lspci -vvv
      spec_ref: PCIe §9.3
    - id: SRIOV-002
      title: Enable SR-IOV
      description: Write SR-IOV Control register VF Enable=1. Verify VFs appear in lspci.
      priority: P1
      tool: Linux (echo N > sriov_numvfs)
      spec_ref: PCIe §9.3.3
    - id: SRIOV-003
      title: VF enumeration
      description: "Enable max VFs. Verify each VF gets unique BDF. Check VF config space: BAR, class code."
      priority: P1
      tool: lspci
      spec_ref: PCIe §9.3
    - id: SRIOV-004
      title: VF BAR assignment
      description: Verify VF BAR resources allocated correctly. Each VF gets VF BAR aperture.
      priority: P1
      tool: lspci -vvv
      spec_ref: PCIe §9.3.3
    - id: SRIOV-005
      title: VF NVMe namespace binding
      description: Assign NVMe namespace to VF (via NVMe NS Management). Verify IO functional on VF.
      priority: P1
      tool: nvme + vfio
      spec_ref: NVMe §8.11
    - id: SRIOV-006
      title: VF passthrough to VM
      description: VFIO bind VF → pass to QEMU/KVM VM. Verify IO from guest OS.
      priority: P1
      tool: QEMU + vfio-pci
      spec_ref: —
    - id: SRIOV-007
      title: PF/VF isolation
      description: IO on PF → verify VF unaffected (and vice versa). Separate namespace, no data leakage.
      priority: P0
      tool: fio on both PF+VF
      spec_ref: —
    - id: SRIOV-008
      title: VF FLR
      description: Issue FLR on single VF. Verify PF and other VFs unaffected. VF resets cleanly.
      priority: P1
      tool: Linux + vfio
      spec_ref: PCIe §6.6.2
    - id: SRIOV-009
      title: PF FLR with active VFs
      description: Issue FLR on PF while VFs active. Verify all VFs reset.
      priority: P1
      tool: Linux
      spec_ref: PCIe §6.6.2
    - id: SRIOV-010
      title: VF AER error isolation
      description: Inject error on VF (e.g., invalid NVMe command). Verify error reported to VF's AER, not PF.
      priority: P1
      tool: Linux + nvme inject
      spec_ref: PCIe §6.2
    - id: SRIOV-011
      title: VF migration (live)
      description: If supported, verify VF state save/restore for live migration.
      priority: P2
      tool: QEMU + migration
      spec_ref: —
    - id: SRIOV-012
      title: ARI (Alternative Routing ID)
      description: "Verify ARI capability if device supports >8 functions. Check ARI Forwarding enabled in upstream port."
      priority: P2
      tool: lspci
      spec_ref: PCIe §6.13
    - id: SRIOV-013
      title: VF performance isolation
      description: Run fio on all VFs simultaneously. Verify fair bandwidth distribution (within 20%).
      priority: P1
      tool: fio multi-job
      spec_ref: —
    - id: SRIOV-014
      title: Disable SR-IOV under load
      description: Set sriov_numvfs=0 while VFs are doing IO. Verify clean teardown, no system hang.
      priority: P1
      tool: Linux script
      spec_ref: —
    - id: SRIOV-015
      title: VF MSI-X vectors
      description: Verify each VF has its own MSI-X vector allocation. No vector sharing between PF and VFs.
      priority: P1
      tool: lspci -vvv per VF
      spec_ref: —
- name: Atomic Operations
  subcategories:
  - name: Atomic Operations
    items:
    - id: ATOM-001
      title: AtomicOp Requester capability
      description: Check DevCap2.AtomicOpRequester for endpoint.
      priority: P2
      tool: lspci -vvv
      spec_ref: PCIe §6.15
    - id: ATOM-002
      title: AtomicOp Routing capability
      description: Check upstream ports for AtomicOpRouting support (required for atomics to work).
      priority: P2
      tool: lspci (RC + switch)
      spec_ref: PCIe §6.15
    - id: ATOM-003
      title: 32-bit AtomicOp (FetchAdd)
      description: If supported, issue 32-bit FetchAdd atomic. Verify correct result.
      priority: P2
      tool: LeCroy exerciser
      spec_ref: PCIe §6.15
    - id: ATOM-004
      title: 64-bit AtomicOp (FetchAdd)
      description: If supported, issue 64-bit FetchAdd atomic. Verify correct result.
      priority: P2
      tool: LeCroy exerciser
      spec_ref: PCIe §6.15
    - id: ATOM-005
      title: 128-bit AtomicOp (CAS)
      description: If supported, issue 128-bit Compare-and-Swap.
      priority: P2
      tool: LeCroy exerciser
      spec_ref: PCIe §6.15
    - id: ATOM-006
      title: AtomicOp egress blocking
      description: If RC doesn't support Atomic routing, verify device doesn't send atomics (or handles UR gracefully).
      priority: P2
      tool: LeCroy
      spec_ref: PCIe §6.15
    - id: ATOM-007
      title: AtomicOp + CMB
      description: If device supports CMB, verify atomics targeting CMB range work correctly.
      priority: P2
      tool: LeCroy + Linux
      spec_ref: NVMe §3.5
    - id: ATOM-008
      title: AtomicOp ordering
      description: Verify atomics follow PCIe ordering rules (posted after posted, non-posted ordered).
      priority: P2
      tool: LeCroy
      spec_ref: PCIe §2.4
- name: TLP Ordering & Relaxed Ordering
  subcategories:
  - name: TLP Ordering & Relaxed Ordering
    items:
    - id: ORD-001
      title: MWr→MWr ordering (same TC)
      description: Verify posted writes on same TC arrive in order. Write A then B → verify B appears after A.
      priority: P0
      tool: LeCroy
      spec_ref: PCIe §2.4
    - id: ORD-002
      title: MWr→MRd ordering (same TC)
      description: "Verify MRd pushes all preceding MWr. Device issues MWr(data) then MWr(CQE) → CQE must be visible after\
        \ data."
      priority: P0
      tool: LeCroy
      spec_ref: PCIe §2.4.2
    - id: ORD-003
      title: Relaxed Ordering — DMA write
      description: Set RO bit on device MWr TLP. Verify host RC handles correctly (reorder allowed).
      priority: P1
      tool: LeCroy + Linux (check RO enable)
      spec_ref: PCIe §2.4.1
    - id: ORD-004
      title: Relaxed Ordering — data before CQE
      description: "Verify data MWr completes at host memory before CQE MWr. If RO disabled: strict order. If RO enabled:\
        \ device must still fence data before CQE."
      priority: P0
      tool: LeCroy
      spec_ref: NVMe §3.3.1
    - id: ORD-005
      title: ID-based Ordering (IDO)
      description: If device sets IDO bit, verify host RC handles it per spec (different RequesterID can reorder).
      priority: P2
      tool: LeCroy
      spec_ref: PCIe §2.4.3
    - id: ORD-006
      title: No Snoop attribute
      description: "Check if device sets No Snoop on DMA TLPs. Verify host CPU cache coherency still maintained (or not, if\
        \ No Snoop)."
      priority: P1
      tool: LeCroy
      spec_ref: PCIe §2.4.1
    - id: ORD-007
      title: TC/VC mapping
      description: "Verify device uses TC0 for all NVMe traffic (NVMe spec requires TC0). If device uses other TCs, verify\
        \ VC mapping."
      priority: P1
      tool: LeCroy
      spec_ref: PCIe §2.4.2
    - id: ORD-008
      title: Doorbell write ordering
      description: "Verify doorbell MWr from host pushes all preceding SQE memory writes. Host must use WMB before doorbell."
      priority: P0
      tool: LeCroy
      spec_ref: NVMe §3.3
    - id: ORD-009
      title: Multi-queue ordering independence
      description: "IO on Queue 1 and Queue 2 can complete out of order relative to each other. Verify no false ordering dependency."
      priority: P1
      tool: fio multi-queue + LeCroy
      spec_ref: NVMe §4.1
    - id: ORD-010
      title: Memory fence behavior
      description: Verify device uses memory fence between data DMA and CQE DMA when RO is enabled.
      priority: P0
      tool: LeCroy
      spec_ref: NVMe §3.3.1
- name: NVMe-over-Fabrics PCIe Host Tests (if applicable)
  subcategories:
  - name: NVMe-over-Fabrics PCIe Host Tests (if applicable)
    items:
    - id: NOF-001
      title: CMB-based SQ
      description: Place SQ in device CMB. Verify host writes SQE via PCIe MWr to CMB BAR.
      priority: P2
      tool: Linux + LeCroy
      spec_ref: NVMe §3.5
    - id: NOF-002
      title: CMB-based CQ
      description: Place CQ in CMB. Verify host polls CQE via PCIe MRd from CMB.
      priority: P2
      tool: Linux + LeCroy
      spec_ref: NVMe §3.5
    - id: NOF-003
      title: CMB + P2P DMA
      description: If supported, verify peer-to-peer DMA between NVMe device CMB and another PCIe device (e.g., GPU).
      priority: P2
      tool: NVIDIA GPUDirect + NVMe
      spec_ref: PCIe §10
    - id: NOF-004
      title: PMR write durability
      description: Write to PMR → power cycle → verify data persists.
      priority: P2
      tool: Linux + LeCroy
      spec_ref: NVMe §3.6
- name: PCIe Peer-to-Peer (P2P) DMA
  subcategories:
  - name: PCIe Peer-to-Peer (P2P) DMA
    items:
    - id: P2P-001
      title: P2P DMA capability check
      description: Check if RC + switch support P2P (ACS, ATS). Check PCIe topology for P2P path.
      priority: P2
      tool: lspci + Linux
      spec_ref: PCIe §10
    - id: P2P-002
      title: P2P NVMe read to GPU
      description: Read from NVMe → DMA directly to GPU memory (bypassing CPU). Verify data integrity.
      priority: P2
      tool: nvidia-fs / GPUDirect
      spec_ref: —
    - id: P2P-003
      title: P2P NVMe write from GPU
      description: GPU issues DMA write → NVMe stores. Verify data integrity.
      priority: P2
      tool: nvidia-fs
      spec_ref: —
    - id: P2P-004
      title: P2P across PCIe switch
      description: Two NVMe SSDs behind same switch → P2P copy between them.
      priority: P2
      tool: Linux p2pmem
      spec_ref: —
    - id: P2P-005
      title: ACS (Access Control Services)
      description: "Verify ACS settings don't block P2P when P2P is desired. Verify ACS blocks P2P when isolation is needed\
        \ (VM)."
      priority: P2
      tool: lspci + setpci
      spec_ref: PCIe §6.12
