    - id: PLAT-008
      title: Linux driver (kernel nvme)
      description: Verify standard in-kernel nvme driver loads, creates /dev/nvmeX. All namespaces visible.
      priority: P0
      tool: Linux
      spec_ref: —
    - id: PLAT-009
      title: Windows driver (inbox/vendor)
      description: Verify Windows inbox NVMe driver loads. SMART, IO, trim functional.
      priority: P1
      tool: Windows
      spec_ref: —
    - id: PLAT-010
      title: UEFI/BIOS boot
      description: Verify SSD is bootable from UEFI. NVMe boot ROM (if applicable).
      priority: P1
      tool: BIOS
      spec_ref: —
    - id: PLAT-011
      title: SR-IOV (if supported)
      description: If device supports SR-IOV, verify VF enumeration, VF BAR, VF IO in VM.
      priority: P2
