- name: Security & Advanced Features
  subcategories:
  - name: Security & Advanced Features
    items:
    - id: SEC-001
      title: IDE (Integrity & Data Encryption)
      description: If supported, verify IDE stream setup, encrypted TLP content.
      priority: P2
      tool: LeCroy + Linux
      spec_ref: PCIe 6.0
    - id: SEC-002
      title: CMA/SPDM (Component Auth)
      description: If supported, verify SPDM authentication via DOE mailbox.
      priority: P2
      tool: Linux + spdm-emu
      spec_ref: PCIe 6.0
    - id: SEC-003
      title: ACS (Access Control Services)
      description: If supported, verify P2P routing control, translation blocking.
      priority: P2
      tool: Linux
      spec_ref: §6.12
    - id: SEC-004
      title: IOMMU DMA attack prevention
      description: Verify device cannot DMA outside allocated IOMMU mapping.
      priority: P1
      tool: Linux (iommu strict)
      spec_ref: System
    - id: SEC-005
      title: Config space lock-down
      description: Verify critical config fields (BAR, Command) can be locked by platform.
      priority: P2
      tool: BIOS/Linux
      spec_ref: System
- name: NVMe-PCIe Interaction
  subcategories:
  - name: NVMe Controller Registers via PCIe
    items:
    - id: NP-001
      title: BAR0 MMIO mapping
      description: "Verify BAR0 maps NVMe controller registers (CAP, VS, INTMS, CC, CSTS, AQA, ASQ, ACQ). Read all and verify\
        \ reset values."
      priority: P0
      tool: Linux (nvme show-regs)
      spec_ref: NVMe §3
    - id: NP-002
      title: BAR0 alignment
      description: Verify BAR0 is 64-bit, non-prefetchable, ≥16KB as required by NVMe spec.
      priority: P0
      tool: Linux (lspci -vvv)
      spec_ref: NVMe §2.1.10
    - id: NP-003
      title: MMIO write ordering
      description: "Write CC.EN=1 → poll CSTS.RDY. Verify memory-mapped write ordering is correct (no write combining on BAR0)."
      priority: P0
      tool: Linux + LeCroy
      spec_ref: NVMe §3.1
    - id: NP-004
      title: Doorbell stride
      description: Read CAP.DSTRD. Verify doorbell registers at correct offset (1000h + 2*y*(4 << DSTRD)).
      priority: P0
      tool: Linux (nvme show-regs)
      spec_ref: NVMe §3.1.1
    - id: NP-005
      title: Admin Queue via PCIe
      description: "Create Admin SQ/CQ. Submit Identify Controller. Verify PCIe MWr (doorbell write) → device DMA reads SQE\
        \ → device DMA writes CQE → MSI-X."
      priority: P0
      tool: LeCroy + Linux
      spec_ref: NVMe §3.3
    - id: NP-006
      title: IO Queue doorbell writes
      description: "Heavy fio workload → capture LeCroy trace. Verify doorbell writes are MWr to correct offset. No coalescing."
      priority: P1
      tool: LeCroy + fio
      spec_ref: NVMe §3.3
    - id: NP-007
      title: CMB (Controller Memory Buffer)
      description: "If device supports CMB (CAP.CMBS=1), verify CMB BAR, size, SQ/CQ in CMB operation. PCIe MRd/MWr to CMB\
        \ range."
      priority: P2
      tool: Linux + LeCroy
      spec_ref: NVMe §3.5
    - id: NP-008
      title: PMR (Persistent Memory Region)
      description: If supported, verify PMR BAR mapping, PCIe ordering rules for PMR writes.
      priority: P2
      tool: Linux + LeCroy
      spec_ref: NVMe §3.6
  - name: NVMe Submission/Completion Queue DMA Patterns
    items:
    - id: NP-010
      title: SQ fetch — MRd pattern
      description: "Capture PCIe trace during IO. Verify device issues MRd to host SQ memory. Check address, size (64B SQE)."
      priority: P0
      tool: LeCroy
      spec_ref: NVMe §4.1
    - id: NP-011
      title: CQ post — MWr pattern
      description: Verify device issues MWr to host CQ memory. Check Phase Tag toggle. CQE = 16B.
      priority: P0
      tool: LeCroy
      spec_ref: NVMe §4.1
    - id: NP-012
      title: SQ fetch batching
      description: Under high QD, verify device fetches multiple SQEs in single MRd (efficiency).
      priority: P1
      tool: LeCroy
      spec_ref: —
    - id: NP-013
      title: Data DMA — Read command
      description: NVMe Read → verify device issues MWr (DMA write to host) for data. Check MPS boundaries.
      priority: P0
      tool: LeCroy + nvme read
      spec_ref: NVMe §4.2
    - id: NP-014
      title: Data DMA — Write command
      description: NVMe Write → verify device issues MRd (DMA read from host) for data. Check Tag reuse.
      priority: P0
      tool: LeCroy + nvme write
      spec_ref: NVMe §4.2
    - id: NP-015
      title: PRP List fetch
      description: NVMe IO with PRP List (>2 pages). Verify device fetches PRP List via MRd before data transfer.
      priority: P0
      tool: LeCroy + custom nvme tool
      spec_ref: NVMe §4.4
    - id: NP-016
      title: SGL (Scatter Gather List)
      description: If SGL supported, verify SGL segment/descriptor fetch via PCIe MRd.
      priority: P1
      tool: LeCroy + fio
      spec_ref: NVMe §4.5
    - id: NP-017
      title: Interrupt after CQ post
      description: "Verify MSI-X interrupt fires after CQE written and becomes visible. Check ordering (CQE MWr before MSI-X\
        \ MWr)."
      priority: P0
      tool: LeCroy
      spec_ref: NVMe §7.5
  - name: NVMe Shutdown & PCIe Interaction
    items:
    - id: NP-020
      title: Normal Shutdown (CC.SHN)
      description: "Set CC.SHN=01b (Normal). Poll CSTS.SHST. Verify no PCIe error during shutdown. Verify all DMA completes\
        \ before SHST=10b."
      priority: P0
      tool: Linux + LeCroy
      spec_ref: NVMe §3.1.5
    - id: NP-021
      title: Abrupt Shutdown (CC.SHN)
      description: Set CC.SHN=10b (Abrupt). Verify faster shutdown. No PCIe UCE.
      priority: P0
      tool: Linux + LeCroy
      spec_ref: NVMe §3.1.5
    - id: NP-022
      title: Shutdown + pending IO
      description: "Issue 1000 IOs → immediately shutdown. Verify clean PCIe behavior (no Completion Timeout, no dangling\
        \ DMA)."
      priority: P0
      tool: Linux + LeCroy
      spec_ref: NVMe §3.1.5
    - id: NP-023
      title: Disable (CC.EN=0)
      description: Clear CC.EN. Poll CSTS.RDY=0. Verify device ceases all DMA and returns to idle on PCIe.
      priority: P0
      tool: Linux + LeCroy
      spec_ref: NVMe §3.1.5
    - id: NP-024
      title: FLR + NVMe state
      description: "Issue PCIe FLR. Verify NVMe controller returns to reset state (CC.EN=0, CSTS.RDY=0). All queues deleted."
      priority: P0
      tool: Linux + LeCroy
      spec_ref: NVMe §3.1, PCIe §6.6.2
    - id: NP-025
      title: D3hot + NVMe state
      description: "Set PCIe PM D3hot. Verify NVMe controller state preserved per No_Soft_Reset. On D0 return, verify state."
      priority: P1
      tool: Linux + LeCroy
      spec_ref: NVMe §3.1, PCIe §5.3
    - id: NP-026
      title: Surprise power loss
      description: "Remove power during heavy IO. Verify on next boot: device enumerates, data integrity (if PLP)."
      priority: P0
      tool: HW (relay) + Linux
      spec_ref: NVMe §8.2
- name: CEM (Card Electromechanical) Compliance
  subcategories:
  - name: CEM (Card Electromechanical) Compliance
    items:
    - id: CEM-001
      title: Card mechanical dimensions
      description: "Verify PCB dimensions match CEM spec for target form factor (M.2 2230/2242/2280, U.2, U.3, E1.S, E3.S)."
      priority: P0
      tool: Mechanical measurement
      spec_ref: CEM §2
    - id: CEM-002
      title: Connector pin assignment
      description: "Verify pin assignment matches form factor spec. Check power, ground, PERST#, CLKREQ#, REFCLK, data lanes."
      priority: P0
      tool: Schematic review + continuity
      spec_ref: CEM §4
    - id: CEM-003
      title: Power rail sequencing
      description: Verify 3.3V (if applicable) and 12V rail sequencing meets CEM timing. No glitch on power-up/down.
      priority: P0
      tool: Oscilloscope
      spec_ref: CEM §5
    - id: CEM-004
      title: Power consumption — Slot limit
      description: "Measure total power. Verify ≤ slot power limit (M.2: varies by key/length, U.2: 25W, E1.S: 25W)."
      priority: P0
      tool: Power meter + thermal chamber
      spec_ref: CEM §5
    - id: CEM-005
      title: "PERST# input characteristics"
      description: "Verify PERST# input threshold levels (VIL, VIH). Measure input capacitance."
      priority: P1
      tool: Oscilloscope
      spec_ref: CEM §5
    - id: CEM-006
      title: "CLKREQ# open drain"
      description: "Verify CLKREQ# is open drain output. Measure pull-up, drive low voltage."
      priority: P1
      tool: Oscilloscope + Logic Analyzer
      spec_ref: CEM §5
    - id: CEM-007
      title: Aux power (3.3Vaux)
      description: If device uses 3.3Vaux for D3cold wake, verify current ≤ spec limit.
      priority: P2
      tool: Power meter
      spec_ref: CEM §5
    - id: CEM-008
      title: LED indicators
      description: If LED pin present (E1.S/U.2), verify correct behavior (activity, fault).
      priority: P2
      tool: Visual inspection
      spec_ref: CEM §6
    - id: CEM-009
      title: Thermal design — case temp
      description: Measure Tcase under sustained IO. Verify within datasheet Tc_max.
      priority: P0
      tool: Thermocouple + thermal chamber
      spec_ref: —
    - id: CEM-010
      title: Vibration/shock
      description: "Verify device survives operating vibration (SSD-specific: 5g, 5-800Hz) and non-operating shock (1500g,\
        \ 0.5ms)."
      priority: P2
      tool: Vibration table + shock tester
      spec_ref: —
- name: Form Factor Specific Tests
  subcategories:
  - name: U.2 / U.3 (Primary Form Factor)
    items:
    - id: FF-010
      title: SFF-8639 connector pin assignment
      description: "Verify all pin assignments: PCIe lanes (TX0-3, RX0-3), power (3.3V, 12V), PERST#, CLKREQ#, DualPort#,\
        \ IFDET#, Activity LED."
      priority: P0
      tool: Mechanical + schematic + continuity test
      spec_ref: SFF-8639
    - id: FF-011
      title: U.2 mechanical dimensions
      description: "Verify 2.5\" drive dimensions (100.45mm × 69.85mm × 7/9.5/15mm height). Screw hole pattern per SFF-8201."
      priority: P0
      tool: Caliper + gauge
      spec_ref: SFF-8201
    - id: FF-012
      title: U.2 12V power delivery
      description: "Measure 12V rail current under max IO load. Verify ≤ 25W total (or device datasheet limit). Check inrush\
        \ current."
      priority: P0
      tool: Power meter + oscilloscope
      spec_ref: SFF-8639
    - id: FF-013
      title: U.2 3.3V power delivery
      description: Measure 3.3V rail. Verify current within spec. Check 3.3Vaux for D3cold wake (if supported).
      priority: P0
      tool: Power meter
      spec_ref: SFF-8639
    - id: FF-014
      title: U.2 dual-port (if applicable)
      description: "If dual-port, verify both PCIe ports enumerate independently. Test failover: disable port A → port B takes\
        \ over."
      priority: P1
      tool: Linux + lspci + 2 hosts
      spec_ref: SFF-8639
    - id: FF-015
      title: U.2 hot-swap
      description: "Insert device into powered backplane. Verify enumeration without system reboot. Remove under OS control\
        \ → clean removal."
      priority: P0
      tool: Hot-swap backplane + Linux
      spec_ref: SFF-8639
    - id: FF-016
      title: U.2 surprise removal
      description: Yank device without OS notification. Verify no kernel panic, AER/DPC handles cleanly.
      priority: P0
      tool: Hot-swap backplane + Linux
      spec_ref: SFF-8639
    - id: FF-017
      title: U.2 cable assembly (if cable-attached)
      description: "For cable-attached U.2 (SFF-8643/8644), verify cable SI at Gen4/Gen5 speeds. Check insertion loss, return\
        \ loss, crosstalk."
      priority: P1
      tool: VNA + cable
      spec_ref: SFF-8643
    - id: FF-018
      title: U.2 Activity LED
      description: Verify LED signal toggles during IO. Check LED polarity matches SFF-8639 spec.
      priority: P2
      tool: Visual + logic analyzer
      spec_ref: SFF-8639
    - id: FF-019
      title: "U.2 IFDET# (Interface Detect)"
      description: "Verify IFDET# pin correctly indicates NVMe (not SAS/SATA). For U.3: verify tri-mode detection."
      priority: P1
      tool: Logic analyzer + multimeter
      spec_ref: SFF-8639/TA-1001
    - id: FF-020
      title: U.3 tri-mode (if applicable)
      description: "In U.3 backplane, verify NVMe protocol auto-selected (not SAS/SATA). Test with U.3 universal backplane."
      priority: P1
      tool: U.3 backplane + Linux
      spec_ref: SFF-TA-1001
    - id: FF-021
      title: U.2 power sequencing
      description: "Monitor 12V/3.3V/PERST# timing during hot-insert. Verify power stable before PERST# de-asserts. No glitches."
      priority: P0
      tool: Oscilloscope (4ch)
      spec_ref: SFF-8639
    - id: FF-022
      title: U.2 vibration & shock (operating)
      description: Run IO during 5g 5-800Hz random vibration. Verify no errors, no link retrain.
      priority: P1
      tool: Vibration table + fio
      spec_ref: —
    - id: FF-023
      title: U.2 thermal — case temperature
      description: "Measure Tcase under sustained sequential write (worst case thermal). Verify within Tc_max from datasheet."
      priority: P0
      tool: Thermocouple + thermal chamber
      spec_ref: —
    - id: FF-024
      title: U.2 multi-drive backplane
      description: Install 24x U.2 drives in JBOF/backplane. Verify all enumerate. Test simultaneous IO on all drives.
      priority: P1
      tool: 24-bay JBOF + Linux
      spec_ref: —
  - name: M.2 (NGFF) — Secondary
    items:
    - id: FF-030
      title: M.2 Key M connector
      description: Verify M-key socket compatibility.
      priority: P2
      tool: Mechanical check
      spec_ref: M.2 Spec
    - id: FF-031
      title: M.2 2280 dimensions
      description: Verify 22mm × 80mm, screw hole position.
      priority: P2
      tool: Caliper
      spec_ref: M.2 Spec
    - id: FF-032
      title: M.2 power — 3.3V only
      description: Verify operates on 3.3V. Current within spec.
      priority: P2
      tool: Power meter
      spec_ref: M.2 Spec
  - name: E1.S / E3.S (EDSFF) — If Applicable
    items:
    - id: FF-040
      title: E1.S connector & dimensions
      description: Verify SFF-TA-1006 connector and form factor.
      priority: P2
      tool: Mechanical check
      spec_ref: SFF-TA-1006
    - id: FF-041
      title: E1.S power (12V)
      description: Verify 12V power within slot budget.
      priority: P2
      tool: Power meter
      spec_ref: SFF-TA-1006
- name: BIOS/Firmware Interaction
  subcategories:
  - name: BIOS/Firmware Interaction
    items:
    - id: FW-001
      title: UEFI enumeration
      description: Verify device appears in UEFI setup. Correct device name, capacity displayed.
      priority: P0
      tool: BIOS
      spec_ref: —
    - id: FW-002
      title: UEFI NVMe boot
      description: Install OS on device → verify bootable from UEFI boot menu.
      priority: P0
      tool: BIOS + OS
      spec_ref: —
    - id: FW-003
      title: Option ROM / UEFI driver
      description: If device has Option ROM, verify it loads. If not, verify UEFI inbox driver handles it.
      priority: P1
      tool: BIOS
      spec_ref: —
    - id: FW-004
      title: BIOS link speed setting
      description: Change BIOS PCIe link speed to Gen3/Gen4. Verify device trains at restricted speed.
      priority: P1
      tool: BIOS + lspci
      spec_ref: —
    - id: FW-005
      title: BIOS ASPM setting
      description: Enable/disable ASPM in BIOS. Verify device respects setting.
      priority: P1
      tool: BIOS + lspci + LeCroy
      spec_ref: —
    - id: FW-006
      title: BIOS bifurcation
      description: Configure slot bifurcation (4x4, 8x8). Verify device trains correctly.
      priority: P1
      tool: BIOS + lspci
      spec_ref: —
    - id: FW-007
      title: Secure Boot interaction
      description: Verify device functions correctly with Secure Boot enabled.
      priority: P1
      tool: BIOS + OS
      spec_ref: —
    - id: FW-008
      title: S3 (Suspend to RAM)
      description: Suspend → resume. Verify device re-enumerates or restores without error. IO functional after resume.
      priority: P0
      tool: Linux (systemctl suspend) + LeCroy
      spec_ref: —
    - id: FW-009
      title: S4 (Hibernate)
      description: Hibernate → resume. Verify device state fully restored.
      priority: P1
      tool: Linux + LeCroy
      spec_ref: —
    - id: FW-010
      title: S5 (Soft Off) + Wake
      description: Shutdown → WoL or power button → verify clean boot with device.
      priority: P1
      tool: Linux
      spec_ref: —
    - id: FW-011
      title: Kexec (fast reboot)
      description: kexec into new kernel. Verify device resets and re-enumerates cleanly.
      priority: P2
      tool: Linux (kexec)
      spec_ref: —
    - id: FW-012
      title: FW update during PCIe operation
      description: If device supports FW update via NVMe FW Download/Commit, verify no PCIe errors during update.
      priority: P0
      tool: Linux (nvme fw-download) + LeCroy
      spec_ref: NVMe §5.8
    - id: FW-013
      title: FW update — reset types
      description: "FW Commit with reset required. Verify correct PCIe reset behavior (conventional vs FLR vs subsystem reset)."
      priority: P0
      tool: Linux (nvme fw-commit) + LeCroy
      spec_ref: NVMe §5.8
- name: Corner Cases & Regression
  subcategories:
  - name: Corner Cases & Regression
    items:
    - id: CC-001
      title: Link training after long idle
      description: Leave device powered but idle for 24h. Verify link still up, no retrain events.
      priority: P1
      tool: LeCroy (long capture) + Linux
      spec_ref: —
    - id: CC-002
      title: Rapid D3hot↔D0 cycling
      description: 1000 iterations of D3hot→D0 with 10ms interval. No link failure.
      priority: P0
      tool: Linux script + LeCroy
      spec_ref: —
    - id: CC-003
      title: Rapid FLR cycling
      description: 1000 FLR iterations with 100ms interval. Verify recovery each time.
      priority: P0
      tool: Linux script + LeCroy
      spec_ref: —
    - id: CC-004
      title: SBR during active DMA
      description: Issue SBR while device is mid-DMA. Verify no system hang, clean recovery.
      priority: P0
      tool: Linux script + LeCroy
      spec_ref: —
    - id: CC-005
      title: Config access during reset
      description: "Read config space during PERST# assertion. Verify CRS or 0xFFFFFFFF, no hang."
      priority: P1
      tool: Linux + HW timing
      spec_ref: —
    - id: CC-006
      title: Back-to-back config writes
      description: Rapid config register writes (no delay). Verify device handles correctly.
      priority: P1
      tool: Linux (setpci in loop)
      spec_ref: —
    - id: CC-007
      title: Completion Timeout — vary values
      description: "Per §7.8.3.2 p.758: Set DevCtl2[3:0] to each supported encoding (0000b=default 50μs-50ms, 0001b=50-100μs,\
        \ 0010b=1-10ms, 0101b=16-55ms, 0110b=65-210ms, 1001b=260-900ms, 1010b=1-3.5s). Trigger CTO at each. Verify AER at\
        \ each timeout value."
      priority: P1
      tool: LeCroy + Linux
      spec_ref: §7.8.3.2 p.758
    - id: CC-008
      title: MPS mismatch
      description: Set endpoint MPS different from RC MPS. Verify correct behavior (should follow minimum).
      priority: P1
      tool: Linux (setpci) + LeCroy
      spec_ref: —
    - id: CC-009
      title: Large BAR remap
      description: Unmap and remap BAR0 to different address. Verify device responds at new address.
      priority: P1
      tool: Linux (setpci)
      spec_ref: —
    - id: CC-010
      title: Non-aligned MMIO access
      description: "Issue 1-byte and 2-byte reads to NVMe registers. Verify correct behavior (may be undefined for some regs)."
      priority: P2
      tool: Linux (devmem2)
      spec_ref: —
    - id: CC-011
      title: AER error storm
      description: Inject 1000 CEs rapidly. Verify system handles rate limiting, no kernel crash.
      priority: P1
      tool: LeCroy (inject) + Linux
      spec_ref: —
    - id: CC-012
      title: ASPM + heavy IO transitions
      description: Alternate between 1s idle (enter L1) and burst IO (exit L1). 10000 cycles. No link error.
      priority: P0
      tool: fio script + LeCroy
      spec_ref: —
    - id: CC-013
      title: Multi-function device
      description: If device exposes multiple PCI functions, verify independent enumeration and IO isolation.
      priority: P1
      tool: Linux (lspci)
      spec_ref: —
    - id: CC-014
      title: Link speed during thermal throttle
      description: Monitor PCIe link speed during device thermal throttle. Verify no unexpected downgrade.
      priority: P1
      tool: Linux + thermal sensor
      spec_ref: —
    - id: CC-015
      title: ECC/Parity error in config space
      description: If platform supports parity checking, verify config space reads don't trigger parity errors.
      priority: P2
      tool: Linux (MCE log)
      spec_ref: —
