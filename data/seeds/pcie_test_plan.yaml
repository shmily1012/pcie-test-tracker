      spec_ref: §9.0
    - id: PLAT-012
      title: Hot-plug (if supported)
      description: If slot supports hot-plug, insert/remove under OS control. Verify no crash, clean enum/removal.
      priority: P1
      tool: HW + Linux
      spec_ref: §6.7
    - id: PLAT-013
      title: Surprise removal
