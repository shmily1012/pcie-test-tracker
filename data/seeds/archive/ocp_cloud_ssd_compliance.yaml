      priority: P0
      tool: Force read-only + test
      ocp_req: INCS-5
- name: Thermal (§9, TTHROTTLE-1 through TTHROTTLE-9)
  subcategories:
  - name: Thermal (§9, TTHROTTLE-1 through TTHROTTLE-9)
    items:
    - id: OCP-TH-001
      title: Thermal throttle mechanism exists; temp check ≥1/sec
      description: Thermal throttle mechanism exists; temp check ≥1/sec
      priority: P0
      tool: Thermal chamber
      ocp_req: TTHROTTLE-1
    - id: OCP-TH-002
      title: Over-temp → AER Type=001b Info=01h; Critical Warning bit 1 = 1
      description: Over-temp → AER Type=001b Info=01h; Critical Warning bit 1 = 1
      priority: P0
      tool: Thermal chamber + AEN
      ocp_req: TTHROTTLE-2
    - id: OCP-TH-003
      title: False activation safeguards (no glitch-triggered throttle)
      description: False activation safeguards (no glitch-triggered throttle)
      priority: P1
      tool: Stress test
      ocp_req: TTHROTTLE-4
    - id: OCP-TH-004
      title: Throttle starts at composite temp 77°C
      description: Throttle starts at composite temp 77°C
      priority: P0
      tool: Thermal chamber
      ocp_req: TTHROTTLE-5
    - id: OCP-TH-005
      title: No throttle on rate-of-change/slew rate alone
      description: No throttle on rate-of-change/slew rate alone
      priority: P1
