metadata:
  version: '1.0'
  spec_source: OCP Cloud SSD v2.5
  target: OCP Cloud SSD compliance
categories:
- name: PCIe Requirements (§5, PCI-1 through PCI-28)
  subcategories:
  - name: PCIe Requirements (§5, PCI-1 through PCI-28)
    items:
    - id: OCP-PCI-001
      title: MPS ≥ 256B
      description: MPS ≥ 256B
      priority: P0
      tool: '`lspci -vvv`'
      ocp_req: PCI-1
      pass_criteria: DevCap MaxPayload ≥ 256
    - id: OCP-PCI-002
      title: CTO range modification
      description: CTO range modification
      priority: P0
      tool: '`setpci` + fio'
      ocp_req: PCI-2
      pass_criteria: "Write DevCtl2[3:0], run IO, no CTO errors"
    - id: OCP-PCI-003
      title: CTO Ranges Supported disclosed
      description: CTO Ranges Supported disclosed
      priority: P1
      tool: '`lspci`'
      ocp_req: PCI-3
      pass_criteria: DevCap2 "Completion Timeout Ranges Supported" field non-zero
    - id: OCP-PCI-004
      title: CTO disable
      description: CTO disable
      priority: P0
      tool: '`setpci`'
      ocp_req: PCI-4
      pass_criteria: Set DevCtl2 bit 4 → device honors infinite timeout
    - id: OCP-PCI-005
      title: "PERST# fundamental reset (even if FW hung)"
      description: "PERST# fundamental reset (even if FW hung)"
      priority: P0
      tool: GPIO/BMC
      ocp_req: PCI-5
      pass_criteria: "Hang FW (error inject) → toggle PERST# → device resets and re-enumerates"
    - id: OCP-PCI-006
      title: FLR support
      description: FLR support
      priority: P0
      tool: '`lspci` + `echo 1 > /sys/bus/pci/.../reset`'
      ocp_req: PCI-6
      pass_criteria: DevCap FLR=1; reset completes <100ms; device re-enumerates
    - id: OCP-PCI-007
      title: No BAR4/BAR5 if no CMB/PMR
      description: No BAR4/BAR5 if no CMB/PMR
      priority: P1
      tool: '`lspci`'
      ocp_req: PCI-8
      pass_criteria: BAR4/BAR5 not present (or only if CMB/PMR supported)
    - id: OCP-PCI-008
      title: MSI-X support
      description: MSI-X support
      priority: P0
      tool: '`lspci -vvv`'
      ocp_req: PCI-9
      pass_criteria: MSI-X capability present
    - id: OCP-PCI-009
      title: MSI-X table in BAR0
      description: MSI-X table in BAR0
      priority: P0
      tool: '`lspci -vvv`'
      ocp_req: PCI-10
      pass_criteria: MSI-X Table BIR=0
    - id: OCP-PCI-010
      title: MSI cap 4-byte aligned
      description: MSI cap 4-byte aligned
      priority: P1
      tool: '`lspci`'
      ocp_req: PCI-11
      pass_criteria: MSI capability offset & 0x3 == 0
    - id: OCP-PCI-011
      title: CTO Ranges A, B, C
      description: CTO Ranges A, B, C
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-13
      pass_criteria: "DevCap2 bits [3:1] = ranges A/B/C supported"
    - id: OCP-PCI-012
      title: Relaxed Ordering support
      description: Relaxed Ordering support
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-14
      pass_criteria: DevCtl RO capability present
    - id: OCP-PCI-013
      title: RO bit clear for CQE/MSI-X writes
      description: RO bit clear for CQE/MSI-X writes
      priority: P0
      tool: LeCroy capture
      ocp_req: PCI-15
      pass_criteria: "Capture device→host TLPs: CQE writes, MSI-X writes have RO=0"
    - id: OCP-PCI-014
      title: RO bit set for data DMAs (when enabled)
      description: RO bit set for data DMAs (when enabled)
      priority: P0
      tool: LeCroy capture
      ocp_req: PCI-16
      pass_criteria: Enable RO → data read DMA TLPs have RO=1
    - id: OCP-PCI-015
      title: All intermediate link speeds
      description: All intermediate link speeds
      priority: P0
      tool: '`lspci` + speed forcing'
      ocp_req: PCI-17
      pass_criteria: "For Gen5 device: verify 2.5/5.0/8.0/16.0/32.0 GT/s all train successfully"
    - id: OCP-PCI-016
      title: No DSI required
      description: No DSI required
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-18
      pass_criteria: Status Register DSI bit = 0
    - id: OCP-PCI-017
      title: No_Soft_Reset = 1
      description: No_Soft_Reset = 1
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-19
      pass_criteria: PMCSR No_Soft_Reset bit = 1; verify D3hot→D0 preserves config
    - id: OCP-PCI-018
      title: No I/O Space BARs
      description: No I/O Space BARs
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-20
      pass_criteria: All BARs type = Memory (bit 0 = 0)
    - id: OCP-PCI-019
      title: All memory BARs 64-bit
      description: All memory BARs 64-bit
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-21
      pass_criteria: "All BARs bits [2:1] = 10b; allocate above 4GB → device functional"
    - id: OCP-PCI-020
      title: Total BAR size ≤ 1MiB (no CMB/PMR)
      description: Total BAR size ≤ 1MiB (no CMB/PMR)
      priority: P1
      tool: '`lspci`'
      ocp_req: PCI-22
      pass_criteria: Sum of all BAR sizes ≤ 1MiB
    - id: OCP-PCI-021
      title: Max 1 PCI bus number
      description: Max 1 PCI bus number
      priority: P0
      tool: '`lspci -t`'
      ocp_req: PCI-23
      pass_criteria: No internal PCIe switches; single bus number
    - id: OCP-PCI-022
      title: 64-bit DMA uniform perf
      description: 64-bit DMA uniform perf
      priority: P0
      tool: fio + IOMMU
      ocp_req: PCI-24
      pass_criteria: Map buffers >4GB, compare perf with <4GB; variance <5%
    - id: OCP-PCI-023
      title: Device Serial Number
      description: Device Serial Number
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-25
      pass_criteria: DSN Extended Cap present; unique per device; same across functions
    - id: OCP-PCI-024
      title: AER Extended Capability
      description: AER Extended Capability
      priority: P0
      tool: '`lspci`'
      ocp_req: PCI-26
      pass_criteria: AER cap present
    - id: OCP-PCI-025
      title: Silent discard VDM during FLR
      description: Silent discard VDM during FLR
      priority: P1
      tool: LeCroy + FLR
      ocp_req: PCI-27
      pass_criteria: Send VDM during FLR → no error logged, TLP silently dropped
    - id: OCP-PCI-026
      title: ATS support
      description: ATS support
      priority: P1
      tool: '`lspci` + IOMMU'
      ocp_req: PCI-28
      pass_criteria: ATS cap present; functional with IOMMU enabled
- name: Boot Requirements (§5.1, BOOT-1/2)
  subcategories:
  - name: Boot Requirements (§5.1, BOOT-1/2)
    items:
    - id: OCP-BOOT-001
      title: UEFI EDK2 NVMe driver boot
      description: UEFI EDK2 NVMe driver boot
      priority: P0
      tool: UEFI shell/BIOS
      ocp_req: BOOT-1
    - id: OCP-BOOT-002
      title: No option ROM
      description: No option ROM
      priority: P0
      tool: '`lspci`'
      ocp_req: BOOT-2
- name: PCIe Error Logging (§5.2, PCIERR-1 through PCIERR-10)
  subcategories:
  - name: PCIe Error Logging (§5.2, PCIERR-1 through PCIERR-10)
    items:
    - id: OCP-ERR-001
      title: Unsupported Request Error (UCE)
      description: Unsupported Request Error (UCE)
      priority: P0
      tool: LeCroy inject
      ocp_req: PCIERR-1
    - id: OCP-ERR-002
      title: ECRC Error (UCE)
      description: ECRC Error (UCE)
      priority: P1
      tool: LeCroy inject
      ocp_req: PCIERR-2
    - id: OCP-ERR-003
      title: Malformed TLP (UCE)
      description: Malformed TLP (UCE)
      priority: P0
      tool: LeCroy inject
      ocp_req: PCIERR-3
    - id: OCP-ERR-004
      title: Receiver Overflow (UCE)
      description: Receiver Overflow (UCE)
      priority: P1
      tool: LeCroy inject
      ocp_req: PCIERR-4
    - id: OCP-ERR-005
      title: Unexpected Completion (UCE)
      description: Unexpected Completion (UCE)
      priority: P1
      tool: LeCroy inject
      ocp_req: PCIERR-5
    - id: OCP-ERR-006
      title: Completer Abort (UCE)
      description: Completer Abort (UCE)
      priority: P1
      tool: LeCroy inject
      ocp_req: PCIERR-6
    - id: OCP-ERR-007
      title: Completion Timeout (UCE)
      description: Completion Timeout (UCE)
      priority: P0
      tool: setpci + fio
      ocp_req: PCIERR-7
    - id: OCP-ERR-008
      title: FC Protocol Error (UCE)
      description: FC Protocol Error (UCE)
      priority: P1
      tool: LeCroy inject
      ocp_req: PCIERR-8
    - id: OCP-ERR-009
      title: Poisoned TLP (UCE)
      description: Poisoned TLP (UCE)
      priority: P1
      tool: LeCroy inject
      ocp_req: PCIERR-9
    - id: OCP-ERR-010
      title: DL Protocol Error (CE→Fatal)
      description: DL Protocol Error (CE→Fatal)
      priority: P0
      tool: LeCroy inject
      ocp_req: PCIERR-10
  - name: Clear PCIe Error Counters (§4.15.7, CPCIE-1 through CPCIE-17)
    items:
    - id: OCP-ERR-011
      title: Clear PCIe Correctable Error Counters via Set Feature C3h
      description: Clear PCIe Correctable Error Counters via Set Feature C3h
      priority: P0
      ocp_req: CPCIE-13
    - id: OCP-ERR-012
      title: Verify SMART C0h PCIe error counters all reset to 0 after clear
      description: Verify SMART C0h PCIe error counters all reset to 0 after clear
      priority: P0
      ocp_req: CPCIE-13
    - id: OCP-ERR-013
      title: SV bit=1 → abort with Feature Not Saveable
      description: SV bit=1 → abort with Feature Not Saveable
      priority: P1
      ocp_req: CPCIE-10
- name: Low Power (§5.3, LPWR-1/2)
  subcategories:
  - name: Low Power (§5.3, LPWR-1/2)
    items:
    - id: OCP-LP-001
      title: ASPM disabled after power cycle/reset
      description: ASPM disabled after power cycle/reset
      priority: P0
      tool: '`lspci` after reset'
      ocp_req: LPWR-1
    - id: OCP-LP-002
      title: ASPM L1 supported
      description: ASPM L1 supported
      priority: P0
      tool: '`lspci`'
      ocp_req: LPWR-2
    - id: OCP-LP-003
      title: ASPM L1 functional
      description: ASPM L1 functional
      priority: P0
      tool: powertop + LeCroy
      ocp_req: LPWR-2
- name: PCIe Eye Capture (§5.4, EYE-1)
  subcategories:
  - name: PCIe Eye Capture (§5.4, EYE-1)
    items:
    - id: OCP-EYE-001
      title: Eye data decode utility exists
      description: Eye data decode utility exists
      priority: P1
      tool: Vendor utility
      ocp_req: EYE-1
    - id: OCP-EYE-002
      title: Eye capture at all supported speeds
      description: Eye capture at all supported speeds
      priority: P1
      tool: Vendor utility + Lane Margining
      ocp_req: —
- name: SMART / Health Information Extended (§4.8.6, Log C0h)
  subcategories:
  - name: SMART / Health Information Extended (§4.8.6, Log C0h)
    items:
    - id: OCP-SM-001
      title: Physical Media Units Written
      priority: P0
      ocp_req: SMART-1
      pass_criteria: Non-zero after writes; tracks WAF
      notes: "15:0"
    - id: OCP-SM-002
      title: Physical Media Units Read
      priority: P0
      ocp_req: SMART-2
      pass_criteria: Non-zero after reads
      notes: "31:16"
    - id: OCP-SM-003
      title: Bad User NAND Blocks
      priority: P0
      ocp_req: SMART-3
      pass_criteria: Normalized=100 (64h) at factory; raw=0
      notes: "39:32"
    - id: OCP-SM-004
      title: Bad System NAND Blocks
      priority: P0
      ocp_req: SMART-4
      pass_criteria: Same format as SMART-3
      notes: "47:40"
    - id: OCP-SM-005
      title: XOR Recovery Count
      priority: P0
      ocp_req: SMART-5
      pass_criteria: Cleared at factory; increments on XOR recovery
      notes: "55:48"
    - id: OCP-SM-006
      title: Uncorrectable Read Error Count
      priority: P0
      ocp_req: SMART-6
      pass_criteria: Total unrecoverable NAND read errors
      notes: "63:56"
    - id: OCP-SM-007
      title: Soft ECC Error Count
      priority: P0
      ocp_req: SMART-7
      pass_criteria: Multi-level ECC recovery count
      notes: "71:64"
    - id: OCP-SM-008
      title: End-to-End Correction Counts
      priority: P0
      ocp_req: SMART-8
      pass_criteria: "Detected (bytes 75:72) + Corrected (79:76)"
      notes: "79:72"
    - id: OCP-SM-009
      title: System Data % Used
      priority: P0
      ocp_req: SMART-9
      pass_criteria: 0 at factory; 100=endurance consumed
      notes: '80'
    - id: OCP-SM-010
      title: Refresh Counts
      priority: P1
      ocp_req: SMART-10
      pass_criteria: Block reallocation for data integrity
      notes: "87:81"
    - id: OCP-SM-011
      title: User Data Erase Counts
      priority: P0
      ocp_req: SMART-11
      pass_criteria: Min (4B) + Max (4B); non-resettable
      notes: "95:88"
    - id: OCP-SM-012
      title: Thermal Throttling Status
      priority: P0
      ocp_req: SMART-12
      pass_criteria: Byte 97=status (00h-03h); byte 96=count
      notes: "97:96"
    - id: OCP-SM-013
      title: DSSD Spec Version
      priority: P0
      ocp_req: SMART-13
      pass_criteria: Major=02h, Minor=0005h for v2.5
      notes: "103:98"
    - id: OCP-SM-014
      title: PCIe Correctable Error Count
      priority: P0
      ocp_req: SMART-14
      pass_criteria: Sum of all CE types; cleared at factory; runtime only
      notes: "111:104"
    - id: OCP-SM-015
      title: Incomplete Shutdowns
      priority: P0
      ocp_req: SMART-15
      pass_criteria: Increments on non-clean shutdown
      notes: "115:112"
    - id: OCP-SM-016
      title: '% Free Blocks'
      priority: P0
      ocp_req: SMART-17
      pass_criteria: '% erased spare blocks available'
      notes: '120'
    - id: OCP-SM-017
      title: Capacitor Health
      priority: P0
      ocp_req: SMART-19
      pass_criteria: '>100% at BOL; FFFFh if no PLP; 0%=minimum'
      notes: "129:128"
- name: Error Injection (§4.15.3, Feature C0h)
  subcategories:
  - name: Error Injection (§4.15.3, Feature C0h)
    items:
    - id: OCP-EINJ-001
