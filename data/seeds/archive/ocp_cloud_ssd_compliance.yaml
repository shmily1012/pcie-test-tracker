- name: Error Recovery (§4.8.7, Log C1h)
  subcategories:
  - name: Error Recovery (§4.8.7, Log C1h)
    items:
    - id: OCP-EREC-001
      title: Panic → AEN with Log ID=C1h, Type=111b (Vendor Specific)
      description: Panic → AEN with Log ID=C1h, Type=111b (Vendor Specific)
      priority: P0
      ocp_req: EREC-AEN-1
    - id: OCP-EREC-002
      title: Device transparent recovery (no AEN if self-recovered)
      description: Device transparent recovery (no AEN if self-recovered)
      priority: P0
      ocp_req: EREC-FUNC-1
    - id: OCP-EREC-003
      title: "Read Error Recovery log C1h: Panic ID, Recovery Action"
      description: "Read Error Recovery log C1h: Panic ID, Recovery Action"
      priority: P0
      ocp_req: —
    - id: OCP-EREC-004
      title: "Panic workflow: AEN → host reads C1h → reset per Panic Reset Action → device ..."
      description: "Panic workflow: AEN → host reads C1h → reset per Panic Reset Action → device recovers"
      priority: P0
      ocp_req: —
- name: Power Loss Protection (§7.8, PLP-1 through PLP-9)
  subcategories:
  - name: Power Loss Protection (§7.8, PLP-1 through PLP-9)
    items:
    - id: OCP-PLP-001
      title: Full PLP for all acked data + metadata
      description: Full PLP for all acked data + metadata
      priority: P0
      tool: Power cut under IO
      ocp_req: PLP-1
    - id: OCP-PLP-002
      title: PLP health check no IO impact
      description: PLP health check no IO impact
      priority: P0
      tool: fio latency monitor
      ocp_req: PLP-2
    - id: OCP-PLP-003
      title: Health check at power-on + every interval (default 15min per PLP-7)
      description: Health check at power-on + every interval (default 15min per PLP-7)
      priority: P0
      tool: Log analysis
      ocp_req: PLP-3
    - id: OCP-PLP-004
      title: During health check, still enough energy for power loss
      description: During health check, still enough energy for power loss
      priority: P0
      tool: Power cut during check
      ocp_req: PLP-4
    - id: OCP-PLP-005
      title: False detection safeguards
      description: False detection safeguards
      priority: P1
      tool: Stress test
      ocp_req: PLP-5
    - id: OCP-PLP-006
      title: Capacitor energy margin measurement (not just open/short)
      description: Capacitor energy margin measurement (not just open/short)
      priority: P0
      tool: SMART-19 monitoring
      ocp_req: PLP-6
    - id: OCP-PLP-007
      title: Default interval = 15 minutes
      description: Default interval = 15 minutes
      priority: P0
      tool: Get Feature C6h
      ocp_req: PLP-7
    - id: OCP-PLP-008
      title: "PLP workflow: check → fail → AEN → flush → EOL/PLP mode"
      description: "PLP workflow: check → fail → AEN → flush → EOL/PLP mode"
      priority: P0
      tool: Simulated cap failure
      ocp_req: PLP-9
- name: Time to Ready & Shutdown (§7.2.1, TTR-1 through TTR-16)
