version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - ./data/db:/app/data/db
      - ./data/seeds:/app/data/seeds
    environment:
      - DATABASE_URL=sqlite:///./data/db/pcie_tracker.db
      - SEEDS_DIR=/app/data/seeds

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
